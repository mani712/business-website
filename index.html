                    oninput="this.setCustomValidity('')"
                    placeholder="Enter your name" 
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-transparent">
                </div>
               
                <div>
                  <label class="block text-gray-700 font-semibold mb-2">Email Address</label>
                  <input 
                    type="email" 
                    id="email" 
                    name="email"
                    required 
                    placeholder="Enter email"
                    oninvalid="this.setCustomValidity('Enter a valid email (example: abc@gmail.com)')"
                    oninput="this.setCustomValidity('')"
                  class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-teal-500">
                </div>
                <div>
                  <label class="block text-gray-700 font-semibold mb-2">Project Requirements</label>
                  <textarea 
                    id="project" 
                    rows="4" 
                    name="message"
                    class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-teal-500">
                  </textarea>
                </div>
                <button id="submitbtn" type="submit" class="w-full bg-teal-600 hover:bg-teal-700 text-white font-semibold py-3 rounded-xl transition-all shadow-md">
                  <span id="btnText">Send Message →</span>
                   <span
                    id="spinner"
                    class="hidden w-5 h-5 border-2 border-white border-t-transparent rounded-full animate-spin">
                  </span>                 
                </button>
                
              </form>
              <div id="status"></div>
              <p id="wassapptext" class="text-center text-sm text-gray-500 mt-4"><i class="fab fa-whatsapp"></i> Or chat instantly via WhatsApp button (bottom right)</p>
              
            </div>
          </div>
        </div>
      </div>
    `,
    };

    const seoConfig = {
      home: {
        title: "Freelance Web Developer in India | Website Development Services",
        description: "Freelance web developer offering responsive, fast, and SEO-friendly website development services for businesses."
      },
      about: {
        title: "About | Freelance Web Developer",
        description: "Experienced freelance web developer specializing in modern, responsive and user-friendly websites."
      },
      services: {
        title: "Web Development Services | Hire Web Developer",
        description: "Custom website development, responsive design, and SEO-friendly solutions for your business."
      },
      contact: {
        title: "Contact | Hire Web Developer",
        description: "Get in touch to hire a freelance web developer and build your website today."
      }
    };



    let currentPage = "home";

    function renderPage(pageId) {
      if (!pages[pageId]) pageId = "home";

      currentPage = pageId;

      updateSEO(pageId);

      document.getElementById("app").innerHTML = pages[pageId];

      window.scrollTo({ top: 0, behavior: "smooth" });



      if (pageId === "contact") {

        attachFormHandler();
      }
    }

    function updateSEO(page) {
      const seo = seoConfig[page] || seoConfig.home;

      document.title = seo.title;

      let metaDesc = document.querySelector("meta[name='description']");
      if (!metaDesc) {
        metaDesc = document.createElement("meta");
        metaDesc.setAttribute("name", "description");
        document.head.appendChild(metaDesc);
      }

      metaDesc.setAttribute("content", seo.description);
    }

    function attachFormHandler() {
      const form = document.getElementById('contactForm');
      const statusDiv = document.getElementById('status');

      const btnText = document.getElementById('btnText');
      const spinner = document.getElementById('spinner');
      const button = document.getElementById('submitbtn');
      const wassappText = document.getElementById('wassapptext');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();

        spinner.classList.remove('hidden');
        btnText.classList.add('hidden');
        button.disabled = true;

        const formData = new FormData(form);
        const data = Object.fromEntries(formData.entries());

        try {
          const res = await fetch(form.action, {
            method: 'POST',
            headers: { 'Accept': 'application/json' },
            body: formData
          });

          if (res.ok) {
            statusDiv.textContent = "✅ Message sent!";
            statusDiv.className = "text-green-600 font-semibold text-center mt-4";
            form.reset();
          } else {
            statusDiv.textContent = "❌ Error sending message.";
            statusDiv.className = "text-red-600 font-semibold text-center mt-4";
          }
        } catch (err) {
          statusDiv.textContent = "❌ Error sending message.";
          statusDiv.className = "text-red-600 font-semibold text-center mt-4";
          console.error(err);
        }

        spinner.classList.add('hidden');
        btnText.classList.remove('hidden');
        wassappText.classList.add('hidden')
        button.disabled = false;
      });
    }

    // Re-attach consultation buttons
    document.querySelectorAll("[data-nav-contact]").forEach((el) => {
      el.addEventListener("click", () => navigateTo("contact"));
    });


    function setActiveNav(pageId) {
      document
        .querySelectorAll(".nav-link, .nav-link-mobile")
        .forEach((link) => {
          if (link.getAttribute("data-page") === pageId) {
            link.classList.add("text-teal-600", "font-bold");
            link.classList.remove("text-gray-700");
          } else {
            link.classList.remove("text-teal-600", "font-bold");
            link.classList.add("text-gray-700");
          }
        });
    }

    function navigateTo(page) {
      const path = page === "home" ? "/" : `/${page}`;
      history.pushState({ page }, "", path);
      renderPage(page);
    }

    function handleRoute() {
      let path = window.location.pathname;

      let page = path === "/" ? "home" : path.replace("/", "");

      if (!pages[page]) page = "home";

      renderPage(page);
    }

    // Event listeners
    window.addEventListener("popstate", handleRoute);

    document
      .querySelectorAll(".nav-link, .nav-link-mobile")
      .forEach((link) => {
        link.addEventListener("click", (e) => {
          e.preventDefault();
          const page = link.getAttribute("data-page");
          if (page) navigateTo(page);
          document.getElementById("mobileMenu")?.classList.add("hidden");
        });
      });

    document.getElementById("menuToggle")?.addEventListener("click", () => {
      const menu = document.getElementById("mobileMenu");
      menu.classList.toggle("hidden");
    });

    // Global click for consultation buttons
    document.addEventListener("click", (e) => {
      if (e.target.closest("[data-nav-contact]")) {
        e.preventDefault();
        navigateTo("contact");
      }
    });

    handleRoute();
  </script>
</body>

</html>
